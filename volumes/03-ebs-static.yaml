apiVersion: v1
kind: PersistentVolume
metadata:
  name: ebs
spec:
  accessModes:
  - ReadWriteOnce
  capacity:
    storage: 5Gi #should be less than or equal to your disk size
  csi:
    driver: ebs.csi.aws.com
    fsType: ext4
    volumeHandle: vol-02207c3895e5c5141
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs
spec:
  storageClassName: "" # Empty string must be explicitly set otherwise default StorageClass will be set
  volumeName: ebs # this is pv name
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi    
---
apiVersion: v1
kind: Pod
metadata:
  name: app
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: html-data
      mountPath: /usr/share/nginx/html
  volumes:
  - name: html-data
    persistentVolumeClaim:
      claimName: ebs
 